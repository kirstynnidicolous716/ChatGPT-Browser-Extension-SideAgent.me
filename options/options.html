<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ChatGPT SidePanel Dev Agent — Settings</title>
  <style>
    body { font: 14px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 24px; }
    label { display:block; margin: 0 0 6px; font-weight: 600; }
    input[type=text] { width: 520px; max-width: 100%; padding: 8px; }
    .row { margin: 12px 0; }
    button { padding: 8px 12px; }
    .ok { color: #16a34a; }
    .bad { color: #dc2626; }
  </style>
</head>
<body>
  <h1>ChatGPT SidePanel Dev Agent — Settings</h1>
  <p>Enter your <strong>OpenAI API key</strong>. It is stored in <code>chrome.storage.local</code> on this device.</p>

  <div class="row">
    <label for="key">OpenAI API Key</label>
    <input id="key" type="text" placeholder="sk-..." />
  </div>
  <div class="row">
    <button id="save">Save</button>
    <span id="status"></span>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
